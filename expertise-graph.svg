  <line x1="172" y1="430" x2="80" y2="500" stroke="#EF9F27" stroke-width="0.8"/>
  <line x1="172" y1="430" x2="172" y2="512" stroke="#EF9F27" stroke-width="0.8"/>
  <line x1="172" y1="430" x2="264" y2="500" stroke="#EF9F27" stroke-width="0.8"/>

