  <text x="508" y="430" text-anchor="middle" dominant-baseline="central" class="node-label" fill="#72243E">Human-</text>
  <text x="508" y="446" text-anchor="middle" dominant-baseline="central" class="sub-label" fill="#993556">Centric</text>

