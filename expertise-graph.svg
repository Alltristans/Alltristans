  <line x1="508" y1="430" x2="416" y2="500" stroke="#ED93B1" stroke-width="0.8"/>
  <line x1="508" y1="430" x2="508" y2="512" stroke="#ED93B1" stroke-width="0.8"/>
  <line x1="508" y1="430" x2="600" y2="500" stroke="#ED93B1" stroke-width="0.8"/>

  <!-- Center node -->
  <circle cx="340" cy="280" r="46" fill="#F1EFE8" stroke="#888780" stroke-width="1"/>
