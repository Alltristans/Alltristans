  <text x="508" y="130" text-anchor="middle" dominant-baseline="central" class="node-label" fill="#085041">Algorithmic</text>
  <text x="508" y="146" text-anchor="middle" dominant-baseline="central" class="sub-label" fill="#0F6E56">Eng. &amp; AI</text>

