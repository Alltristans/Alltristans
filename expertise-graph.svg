  <text x="508" y="438" text-anchor="middle" dominant-baseline="central" class="sub-label" fill="#993556">Centric</text>

  <!-- Skill nodes: blue -->
  <circle cx="80" cy="60" r="22" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.8"/>
  <text x="80" y="60" text-anchor="middle" dominant-baseline="central" class="skill-label" fill="#0C447C">Python</text>
  <circle cx="172" cy="48" r="22" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.8"/>
  <text x="172" y="48" text-anchor="middle" dominant-baseline="central" class="skill-label" fill="#0C447C">SQL</text>
  <circle cx="264" cy="60" r="22" fill="#B5D4F4" stroke="#378ADD" stroke-width="0.8"/>
  <text x="264" y="60" text-anchor="middle" dominant-baseline="central" class="skill-label" fill="#0C447C">ETL</text>

  <!-- Skill nodes: teal -->
  <circle cx="416" cy="60" r="22" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="416" y="60" text-anchor="middle" dominant-baseline="central" class="skill-label" fill="#085041">PyTorch</text>
  <circle cx="508" cy="48" r="22" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="508" y="48" text-anchor="middle" dominant-baseline="central" class="skill-label" fill="#085041">LLM</text>
  <circle cx="600" cy="60" r="22" fill="#9FE1CB" stroke="#1D9E75" stroke-width="0.8"/>
  <text x="600" y="60" text-anchor="middle" dominant-baseline="central" class="skill-label" fill="#085041">ONNX</text>

  <!-- Skill nodes: amber -->
  <circle cx="80" cy="500" r="22" fill="#FAC775" stroke="#BA7517" stroke-width="0.8"/>
  <text x="80" y="500" text-anchor="middle" dominant-baseline="central" class="skill-label" fill="#633806">Unity</text>
  <circle cx="172" cy="512" r="22" fill="#FAC775" stroke="#BA7517" stroke-width="0.8"/>
  <text x="172" y="512" text-anchor="middle" dominant-baseline="central" class="skill-label" fill="#633806">Godot</text>
  <circle cx="264" cy="500" r="22" fill="#FAC775" stroke="#BA7517" stroke-width="0.8"/>
  <text x="264" y="500" text-anchor="middle" dominant-baseline="central" class="skill-label" fill="#633806">Systems</text>

  <!-- Skill nodes: pink -->
  <circle cx="416" cy="500" r="22" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.8"/>
  <text x="416" y="500" text-anchor="middle" dominant-baseline="central" class="skill-label" fill="#72243E">Figma</text>
  <circle cx="508" cy="512" r="22" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.8"/>
  <text x="508" y="512" text-anchor="middle" dominant-baseline="central" class="skill-label" fill="#72243E">UX</text>
  <circle cx="600" cy="500" r="22" fill="#F4C0D1" stroke="#D4537E" stroke-width="0.8"/>
  <text x="600" y="500" text-anchor="middle" dominant-baseline="central" class="skill-label" fill="#72243E">Research</text>
</svg>
