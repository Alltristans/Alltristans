  <text x="340" y="289" text-anchor="middle" dominant-baseline="central" class="sub-label" fill="#5F5E5A">Domains</text>

  <!-- Domain: Data Intelligence (blue) -->
  <circle cx="172" cy="130" r="40" fill="#E6F1FB" stroke="#378ADD" stroke-width="1"/>
  <text x="172" y="113" text-anchor="middle" dominant-baseline="central" class="icon">&#128202;</text>
  <text x="172" y="130" text-anchor="middle" dominant-baseline="central" class="node-label" fill="#0C447C">Data</text>
  <text x="172" y="146" text-anchor="middle" dominant-baseline="central" class="sub-label" fill="#185FA5">Intelligence</text>

  <!-- Domain: Algorithmic AI (teal) -->
  <circle cx="508" cy="130" r="40" fill="#E1F5EE" stroke="#1D9E75" stroke-width="1"/>
